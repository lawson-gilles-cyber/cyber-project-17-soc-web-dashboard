<!DOCTYPE html>
<html>
<head>
    <title>SOC Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>SOC Dashboard</h1>

<h2>Logs</h2>
<ul>
    {% for log in logs %}
        <li>{{ log }}</li>
    {% endfor %}
</ul>

<h2>Alerts</h2>
<ul>
    {% for alert in alerts %}
        <li>{{ alert }}</li>
    {% endfor %}
</ul>

</body>
</html>
